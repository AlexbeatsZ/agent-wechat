# Sample docker-compose for standalone single-container agent-wechat deployment.
# Generate a token before starting:
#   mkdir -p ~/Project/Scripts/Docker/agent-wechat
#   openssl rand -hex 32 > ~/Project/Scripts/Docker/agent-wechat/token
#   chmod 600 ~/Project/Scripts/Docker/agent-wechat/token

services:
  agent-wechat:
    image: agent-wechat:amd64
    container_name: agent-wechat
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
    ports:
      - "6174:6174"
      - "6080:6080"
      - "3001:3001"
    volumes:
      - agent-wechat-data:/data
      - agent-wechat-home:/home/wechat
      - ${AGENT_WECHAT_TOKEN_FILE:-C:/Users/Meta/Project/Scripts/Docker/agent-wechat/token}:/data/auth-token:ro
    environment:
      - PROXY=${PROXY:-}
      - ENABLE_WEB=1
      - WEB_PORT=3001
      - AGENT_WECHAT_BASE_URL=http://127.0.0.1:6174
      - AGENT_WECHAT_TOKEN_FILE=/data/auth-token
    restart: unless-stopped

volumes:
  agent-wechat-data:
  agent-wechat-home:
